<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Surprise 🎁</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#6dd5fa,#4facfe,#8e44ad,#ff6ec7);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    padding:20px;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    width:100%;
    max-width:700px;
    color:white;
}

h1{
    font-size:2.2rem;
    margin-bottom:10px;
}

.subtitle{
    font-size:1rem;
    opacity:.95;
    margin-bottom:25px;
}

.gift{
    font-size:110px;
    cursor:pointer;
    display:inline-block;
    animation:bounce 1.5s infinite;
    transition:.3s;
}

.gift:hover{
    transform:scale(1.15) rotate(8deg);
}

@keyframes bounce{
    50%{
        transform:translateY(-18px);
    }
}

.card{
    display:none;
    margin-top:25px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    animation:pop .7s ease;
}

@keyframes pop{
    from{
        opacity:0;
        transform:scale(.6);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.card h2{
    color:#fff6a3;
    margin-bottom:20px;
}

#message{
    white-space:pre-wrap;
    line-height:1.8;
    font-size:20px;
    min-height:220px;
}

button{
    margin-top:25px;
    padding:14px 28px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:#ff4f81;
    color:white;
    font-size:17px;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.float{
    position:fixed;
    bottom:-30px;
    animation:floatUp linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}

/* Mobile */
@media(max-width:600px){

h1{
    font-size:1.7rem;
}

.subtitle{
    font-size:.95rem;
}

.gift{
    font-size:85px;
}

.card{
    padding:22px;
}

#message{
    font-size:17px;
    min-height:180px;
}

button{
    width:100%;
}

}
</style>

</head>

<body>

<div class="container">

<h1>🎁 A Little Surprise</h1>
<p class="subtitle">Click the gift below 💙</p>

<div class="gift" id="gift">🎁</div>

<div class="card" id="card">

<h2>✨ Just for You ✨</h2>

<div id="message"></div>

<button onclick="celebrate()">Celebrate 🎉</button>

</div>

</div>

<script>

const text = `Hey! 😊

Just a little reminder...

✨ You are incredibly talented.

Your creativity, kindness, and hard work make you truly special.

Never stop believing in yourself because you have the power to achieve amazing things.

Keep shining, keep smiling, and keep being YOU.

💙 You're awesome!`;

const gift=document.getElementById("gift");
const card=document.getElementById("card");
const message=document.getElementById("message");

gift.onclick=()=>{

gift.style.display="none";
card.style.display="block";

typeWriter();
launchConfetti();

setInterval(createHeart,250);

}

let i=0;

function typeWriter(){

if(i<text.length){
message.innerHTML+=text.charAt(i);
i++;
setTimeout(typeWriter,28);
}

}

function createHeart(){

const emojis=["💙","💖","✨","🌟","💜"];

const heart=document.createElement("div");

heart.className="float";

heart.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

function launchConfetti(){

const colors=["#ff4f81","#FFD93D","#6BCB77","#4D96FF","#ffffff","#ff9ff3"];

for(let i=0;i<120;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},4500);

}

}

function celebrate(){

launchConfetti();

for(let i=0;i<40;i++){
setTimeout(createHeart,i*60);
}

}

</script>

</body>
</html>
