<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 A Special Surprise 🌟</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#6dd5fa,#2980b9,#8e44ad,#ff6ec7);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    text-align:center;
    color:white;
}

h1{
    margin-bottom:10px;
    text-shadow:2px 2px 10px black;
}

.gift{
    font-size:120px;
    cursor:pointer;
    animation:bounce 1.5s infinite;
    transition:.4s;
}

.gift:hover{
    transform:scale(1.2) rotate(10deg);
}

@keyframes bounce{
    50%{
        transform:translateY(-18px);
    }
}

.card{
    display:none;
    margin:auto;
    margin-top:20px;
    width:700px;
    max-width:90%;
    padding:35px;
    border-radius:25px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.3);
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    animation:pop .8s;
}

@keyframes pop{
    from{
        transform:scale(.2);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.message{
    font-size:21px;
    line-height:1.8;
    min-height:270px;
    white-space:pre-wrap;
}

.highlight{
    color:#ffe66d;
    font-weight:bold;
}

button{
    margin-top:25px;
    padding:14px 35px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    color:white;
    background:#ff4f81;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.floating{
    position:absolute;
    font-size:25px;
    animation:float linear forwards;
}

@keyframes float{

from{
transform:translateY(0) scale(1);
opacity:1;
}

to{
transform:translateY(-110vh) scale(2);
opacity:0;
}

}

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall linear forwards;
}

@keyframes fall{

from{
transform:translateY(-20px) rotate(0deg);
}

to{
transform:translateY(110vh) rotate(720deg);
opacity:0;
}

}
</style>

</head>

<body>

<div class="container">

<h1>🎁 I Have Something For You 🎁</h1>
<p>Click the gift!</p>

<div class="gift" id="gift">🎁</div>

<div class="card" id="card">

<h2>🌟 Just For You 🌟</h2>

<div id="message" class="message"></div>

<h3 id="quote" style="margin-top:25px;color:#ffe66d;"></h3>

<button onclick="celebrate()">Celebrate 🎉</button>

</div>

</div>

<script>

const gift=document.getElementById("gift");
const card=document.getElementById("card");
const message=document.getElementById("message");

const text=`Hey Sonam,

I just wanted to remind you of something...

✨ You are incredibly TALENTED.

You have amazing skills, a brilliant mind, and a heart that never gives up.
⭐ Keep dreaming.
⭐ Keep creating.
⭐ Keep believing.
And most importantly...

💙 YOU ARE ABSOLUTELY GREAT! 💙`;

const quotes=[
"🌈 Your talent speaks louder than words.",
"💖 Never stop believing in yourself.",
"🚀 You are capable of amazing things.",
"🌟 The future is brighter because of you.",
"✨ Keep shining, superstar!",
"🎉 Great people make great memories.",
"💙 You're one of a kind!"
];

gift.onclick=function(){

gift.style.display="none";
card.style.display="block";

typeWriter();

setInterval(createFloating,250);

confetti();

}

let i=0;

function typeWriter(){

if(i<text.length){

message.innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,30);

}else{

document.getElementById("quote").innerHTML=quotes[Math.floor(Math.random()*quotes.length)];

}

}

function createFloating(){

const emojis=["💖","✨","🌟","💙","💜","🎉"];

const e=document.createElement("div");

e.className="floating";

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";

e.style.top="100vh";

e.style.fontSize=(20+Math.random()*25)+"px";

e.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),6000);

}

function confetti(){

const colors=["red","yellow","blue","green","orange","pink","purple","white"];

for(let i=0;i<180;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

}

function celebrate(){

confetti();

for(let i=0;i<50;i++) createFloating();

alert("🌟 You are talented.\n\n💙 You are amazing.\n🚀 Keep believing in yourself.\n\nNever stop shining!");

}

</script>

</body>
</html>
